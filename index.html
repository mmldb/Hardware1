<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Környezeti Napló - Görgethető</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --primary: #4a90e2; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        /* Konténer a görgetéshez */
        .chart-viewport {
            width: 100%;
            overflow-x: auto; /* Itt történik a varázslat: vízszintes görgetés */
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        /* A grafikon tényleges szélessége - jóval nagyobb, mint a képernyő */
        .chart-wrapper {
            width: 2000px; 
            height: 400px;
            padding: 10px;
        }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin: 0; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 1.2rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card"><h3>Zaj</h3><p>Csendes</p></div>
        <div class="card"><h3>Mozgás</h3><p>Nincs</p></div>
    </div>

    <div class="chart-viewport">
        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const generateCleanData = () => {
            const data = [];
            const now = new Date();
            // 24 óra, 15 perces bontásban = 96 adatpont
            for (let i = 96; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 15 * 60000);
                const hour = time.getHours();
                const isNight = hour >= 20 || hour <= 7;
                
                data.push({
                    t: time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    noise: isNight ? (Math.random() * 10 + 5) : (Math.random() * 30 + 15),
                    temp: 22 + Math.sin(i / 10) * 0.5,
                    move: (isNight && Math.random() > 0.95) || (!isNight && Math.random() > 0.7) ? 40 : 0
                });
            }
            return data;
        };

        const mockData = generateCleanData();

        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [
                    {
                        label: 'Zajszint (%)',
                        data: mockData.map(d => d.noise),
                        borderColor: '#4a90e2',
                        backgroundColor: 'rgba(74, 144, 226, 0.1)',
                        fill: true,
                        tension: 0.4, // Ettől lesznek szép simák a vonalak, nem szögletesek
                        pointRadius: 0, // Eltüntetjük a pöttyöket a tisztább képért
                    },
                    {
                        label: 'Mozgás (Event)',
                        data: mockData.map(d => d.move),
                        borderColor: '#ff4757',
                        backgroundColor: '#ff4757',
                        type: 'bar', // A mozgás legyen oszlop, így jobban elkülönül
                        barThickness: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            maxRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 24 // Csak óránként írja ki az időt
                        }
                    },
                    y: { beginAtZero: true, max: 100 }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    </script>
</body>
</html>
