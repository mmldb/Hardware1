<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070808">
    <meta name="description" content="Gyerekszobai környezeti napló és alvásmonitor prototípus.">
    <title>Room Pro Analytics</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=3">
    <link rel="stylesheet" href="theme.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="app.js?v=4" defer></script>
    <script src="theme.js?v=2" defer></script>
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <div class="brand-kicker">ROOM PRO / ENV LOG</div>
            <h1>Környezeti Napló</h1>
        </div>
        <div class="header-tools">
            <div class="date-display" id="header-date">--</div>
            <button class="view-toggle" id="view-toggle" type="button">Váltás: Spektrum</button>
        </div>
    </header>

    <main>
        <section class="status-strip" aria-label="Rendszer állapot">
            <span>LIVE MOCK</span>
            <span>24H WINDOW</span>
            <span>INDEX LOCK</span>
        </section>

        <section class="dashboard" aria-label="Aktuális mérési értékek">
            <button class="card active" data-idx="0" type="button">
                <span class="metric-code">N-01</span>
                <h3>Zajszint</h3>
                <p id="live-noise">-- %</p>
            </button>
            <button class="card" data-idx="2" type="button">
                <span class="metric-code">T-02</span>
                <h3>Hőmérséklet</h3>
                <p id="live-temp">-- °C</p>
            </button>
            <button class="card active" data-idx="1" type="button">
                <span class="metric-code">M-03</span>
                <h3>Mozgás</h3>
                <p id="live-move">Stab.</p>
            </button>
            <button class="card" data-idx="3" type="button">
                <span class="metric-code">L-04</span>
                <h3>Fényerő</h3>
                <p id="live-lux">-- lx</p>
            </button>
        </section>

        <section class="playhead-display" aria-live="polite">
            <div class="playhead-label">PLAYHEAD</div>
            <div class="playhead-time" id="center-time">00:00</div>
            <div class="playhead-stats" id="center-stats">-- | -- | --</div>
        </section>

        <section class="timeline-container" aria-label="Idővonal">
            <div class="timeline-head">
                <span>SENSOR SPECTRUM</span>
                <span>SCROLL UNDER PIN</span>
            </div>
            <button class="add-event-btn" id="add-event-btn" type="button" aria-label="Esemény hozzáadása">+</button>
            <div class="playhead" aria-hidden="true"></div>
            <div class="chart-viewport" id="viewport">
                <div class="chart-wrapper" id="chart-holder">
                    <canvas id="mainChart"></canvas>
                    <div id="spectrum-container" class="spectrum-view" aria-hidden="true">
                        <div class="spectrum-row" id="row-noise"></div>
                        <div class="spectrum-row" id="row-temp"></div>
                        <div class="spectrum-row" id="row-lux"></div>
                        <div class="spectrum-row" id="row-move"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-backdrop" id="modal-backdrop" hidden></div>
    <dialog id="event-modal">
        <form method="dialog" id="event-form">
            <h3 id="modal-time-label">00:00</h3>
            <input type="text" id="event-input" placeholder="Mi történt?" autocomplete="off">
            <button class="btn-main" id="save-event-btn" type="submit">Rögzítés</button>
            <button class="btn-danger" id="delete-event-btn" type="button" hidden>Törlés</button>
            <button class="btn-ghost" id="cancel-event-btn" type="button">Mégse</button>
        </form>
    </dialog>
</body>
</html>
