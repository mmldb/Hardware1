<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Room Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --accent: #f43f5e;
            --grid: #334155;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; padding: 15px;
            overflow-x: hidden;
        }

        h1 { font-size: 1.2rem; margin-bottom: 15px; font-weight: 500; }

        /* Mini-Map stílus */
        .minimap-container {
            width: 100%;
            height: 60px;
            background: var(--card);
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 5px;
            box-sizing: border-box;
        }

        /* Fő grafikon görgető */
        .chart-viewport {
            width: 100%;
            overflow-x: auto;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--grid);
            -webkit-overflow-scrolling: touch;
        }

        .chart-wrapper {
            width: 1200px; /* Optimalizált szélesség */
            height: 350px;
            padding: 10px;
        }

        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 15px;
        }
        
        .card { 
            background: var(--card); 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--grid);
        }
        
        .card h3 { margin: 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 1.1rem; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>

    <h1>🌙 Room Analytics</h1>

    <div class="dashboard">
        <div class="card"><h3>Státusz</h3><p>Csendes</p></div>
        <div class="card"><h3>Hőmérséklet</h3><p>22.4°C</p></div>
    </div>

    <!-- Mini-Map (Teljes 24 óra egyben) -->
    <div class="minimap-container">
        <canvas id="miniMapChart"></canvas>
    </div>

    <!-- Fő, görgethető grafikon -->
    <div class="chart-viewport">
        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const generateData = () => {
            const data = [];
            const now = new Date();
            for (let i = 96; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 15 * 60000);
                const hour = time.getHours();
                const isNight = hour >= 21 || hour <= 6;
                data.push({
                    t: time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    noise: isNight ? (Math.random() * 8 + 4) : (Math.random() * 25 + 12),
                    move: (isNight && Math.random() > 0.96) ? 30 : 0
                });
            }
            return data;
        };

        const mockData = generateData();
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b' } },
                y: { display: false, beginAtZero: true, max: 100 }
            }
        };

        // 1. MINI-MAP GRAFIKON (Fix, nem görgethető)
        new Chart(document.getElementById('miniMapChart'), {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [{
                    data: mockData.map(d => d.noise),
                    borderColor: 'rgba(56, 189, 248, 0.5)',
                    borderWidth: 1,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    pointRadius: 0,
                    tension: 0.4
                }]
            },
            options: { 
                ...commonOptions, 
                scales: { x: { display: false }, y: { display: false } } 
            }
        });

        // 2. FŐ GRAFIKON (Görgethető)
        new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [
                    {
                        label: 'Zaj',
                        data: mockData.map(d => d.noise),
                        borderColor: '#38bdf8',
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: 'Mozgás',
                        data: mockData.map(d => d.move),
                        backgroundColor: '#f43f5e',
                        type: 'bar',
                        barThickness: 4
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    x: { ticks: { color: '#64748b', maxTicksLimit: 12 }, grid: { color: '#334155' } },
                    y: { display: true, position: 'right', grid: { color: '#334155' }, ticks: { color: '#64748b' } }
                }
            }
        });
    </script>
</body>
</html>
