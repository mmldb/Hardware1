<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Analytics v1.9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --accent: #f43f5e; --grid: #334155;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; overflow: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .date-display { font-size: 0.8rem; color: var(--primary); }

        /* Központi IDŐ-KIJELZŐ a tű alatt */
        .playhead-time { text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }

        /* CDJ-Style Konténer */
        .timeline-container { position: relative; width: 100%; background: var(--card); border-radius: 15px; border: 1px solid var(--grid); overflow: hidden; }
        
        /* A FIX FÜGGŐLEGES TŰ (Indikátor) */
        .playhead {
            position: absolute; left: 50%; top: 40px; bottom: 30px;
            width: 2px; background: var(--primary); box-shadow: 0 0 10px var(--primary);
            z-index: 100; pointer-events: none; border-left: 1px dashed rgba(56, 189, 248, 0.5);
        }

        .chart-viewport { width: 100%; overflow-x: auto; scroll-behavior: auto; -webkit-overflow-scrolling: touch; }
        /* Padding a széleken, hogy a tűt az elejére/végére is lehessen tekerni */
        .chart-wrapper { width: 2500px; height: 300px; padding: 0 50%; box-sizing: border-box; position: relative; }

        /* Akció gomb a tű felett */
        .add-event-btn {
            position: absolute; left: 50%; top: 5px; transform: translateX(-50%);
            width: 35px; height: 35px; border-radius: 50%; background: var(--primary);
            border: none; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; z-index: 101;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .event-tag {
            position: absolute; top: 50px; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px;
            font-size: 0.7rem; white-space: nowrap; cursor: pointer; z-index: 50;
        }

        /* Modal */
        #event-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); border: 1px solid var(--grid); padding: 20px; border-radius: 15px;
            z-index: 1000; width: 85%; max-width: 320px;
        }
        input { width: 100%; background: var(--bg); border: 1px solid var(--grid); color: white; padding: 12px; margin: 15px 0; border-radius: 8px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-save { background: var(--primary); flex: 2; border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; }
        .btn-del { background: var(--accent); flex: 1; border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="date-display">2026. Május 04.</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">SCROLL TO NAVIGATE</div>
    </header>

    <div class="playhead-time" id="center-time">--:--</div>

    <div class="timeline-container">
        <button class="add-event-btn" onclick="openEventModal()">+</button>
        <div class="playhead"></div>
        
        <div class="chart-viewport" id="viewport">
            <div class="chart-wrapper" id="chart-holder">
                <canvas id="mainChart"></canvas>
                <!-- Dinamikus event tagek helye -->
            </div>
        </div>
    </div>

    <div id="event-modal">
        <h3 id="modal-title">Új bejegyzés</h3>
        <p id="modal-time-label" style="opacity: 0.6; font-size: 0.9rem;"></p>
        <input type="text" id="event-input" placeholder="Pl: Lázcsillapító, Alvás...">
        <div class="modal-btns">
            <button class="btn-save" onclick="saveEvent()">Mentés</button>
            <button id="del-btn" class="btn-del" onclick="deleteEvent()" style="display:none">Törlés</button>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#64748b; width:100%; margin-top:10px;">Bezár</button>
    </div>

    <script>
        const chartWidth = 2500;
        const viewport = document.getElementById('viewport');
        const timeDisplay = document.getElementById('center-time');
        let events = []; // { id: 1, timeIdx: 40, text: "Lázcsillapító" }
        let activeEventId = null;

        // 1. ADATGENERÁLÁS (Tisztább görbe DJ deckhez)
        const generateData = () => {
            const data = []; const now = new Date();
            for (let i = 120; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 12 * 60000); // 12 perces közök
                data.push({
                    t: time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    noise: Math.random() * 25 + 10
                });
            }
            return data;
        };
        const mockData = generateData();

        // 2. CHART KONFIG
        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [{
                    data: mockData.map(d => d.noise),
                    borderColor: '#38bdf8',
                    borderWidth: 2,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.05)',
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#64748b' } },
                    y: { display: false, beginAtZero: true, max: 100 }
                }
            }
        });

        // 3. CDJ NAVIGÁCIÓS LOGIKA
        viewport.addEventListener('scroll', () => {
            // Kiszámoljuk melyik adatponton áll a tű (a közepén)
            const scrollLeft = viewport.scrollLeft;
            const scrollMax = viewport.scrollWidth - viewport.clientWidth;
            const percent = scrollLeft / scrollMax;
            
            const index = Math.round(percent * (mockData.length - 1));
            if(mockData[index]) {
                timeDisplay.innerText = mockData[index].t;
                window.currentIdx = index;
            }
        });

        // 4. EVENT KEZELÉS
        function openEventModal(eventId = null) {
            const modal = document.getElementById('event-modal');
            const delBtn = document.getElementById('del-btn');
            activeEventId = eventId;

            if(eventId !== null) {
                const ev = events.find(e => e.id === eventId);
                document.getElementById('event-input').value = ev.text;
                document.getElementById('modal-time-label').innerText = mockData[ev.timeIdx].t;
                delBtn.style.display = 'block';
                document.getElementById('modal-title').innerText = "Módosítás";
            } else {
                document.getElementById('event-input').value = '';
                document.getElementById('modal-time-label').innerText = mockData[window.currentIdx].t;
                delBtn.style.display = 'none';
                document.getElementById('modal-title').innerText = "Új bejegyzés";
            }
            modal.style.display = 'block';
        }

        function saveEvent() {
            const text = document.getElementById('event-input').value;
            if(!text) return;

            if(activeEventId !== null) {
                const ev = events.find(e => e.id === activeEventId);
                ev.text = text;
            } else {
                const newEvent = {
                    id: Date.now(),
                    timeIdx: window.currentIdx,
                    text: text
                };
                events.push(newEvent);
            }
            renderEvents();
            closeModal();
        }

        function deleteEvent() {
            events = events.filter(e => e.id !== activeEventId);
            renderEvents();
            closeModal();
        }

        function renderEvents() {
            // Töröljük a régieket a DOM-ból
            document.querySelectorAll('.event-tag').forEach(e => e.remove());
            
            events.forEach(ev => {
                const xPos = mainChart.scales.x.getPixelForValue(mockData[ev.timeIdx].t);
                const tag = document.createElement('div');
                tag.className = 'event-tag';
                tag.innerText = ev.text;
                tag.style.left = xPos + "px";
                tag.onclick = (e) => {
                    e.stopPropagation();
                    openEventModal(ev.id);
                };
                document.getElementById('chart-holder').appendChild(tag);
            });
        }

        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
        
        // Kezdő pozíció a végére (legfrissebb adat)
        window.onload = () => {
            viewport.scrollLeft = viewport.scrollWidth;
            renderEvents();
        };
    </script>
</body>
</html>
