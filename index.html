<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Room Monitor Pro v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --accent: #f43f5e; --temp: #fbbf24; --lux: #a855f7; --grid: #334155;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .date-display { font-size: 0.9rem; color: var(--primary); font-weight: 600; }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .card.active[data-idx="0"] { border-color: var(--primary); }
        .card.active[data-idx="2"] { border-color: var(--temp); }
        .card.active[data-idx="1"] { border-color: var(--accent); }
        .card.active[data-idx="3"] { border-color: var(--lux); }
        .card h3 { margin: 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 1.1rem; font-weight: 700; color: var(--text); }

        /* Skála Útmutató */
        .y-axis-guide {
            display: flex; justify-content: space-between; font-size: 0.65rem; color: #64748b;
            padding: 5px 10px; background: rgba(30, 41, 59, 0.5); border-radius: 5px; margin-bottom: 10px;
        }

        .minimap-wrapper { position: relative; width: 100%; height: 60px; background: var(--card); border-radius: 8px; margin-bottom: 15px; cursor: pointer; overflow: hidden; border: 1px solid var(--grid); }
        #view-indicator { position: absolute; top: 0; height: 100%; background: rgba(56, 189, 248, 0.1); border: 2px solid var(--primary); pointer-events: none; border-radius: 4px; box-sizing: border-box; }

        .playhead-time { text-align: center; font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; font-variant-numeric: tabular-nums; }

        .timeline-container { position: relative; width: 100%; background: var(--card); border-radius: 15px; border: 1px solid var(--grid); overflow: hidden; }
        .playhead { position: absolute; left: 50%; top: 45px; bottom: 35px; width: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); z-index: 100; pointer-events: none; }
        .add-event-btn { position: absolute; left: 50%; top: 8px; transform: translateX(-50%); width: 32px; height: 32px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 1.4rem; cursor: pointer; z-index: 101; }

        .chart-viewport { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chart-wrapper { width: 2000px; height: 320px; padding: 0 50%; box-sizing: border-box; position: relative; }

        .event-tag { position: absolute; top: 55px; transform: translateX(-50%); background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        #event-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 1px solid var(--grid); padding: 20px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 320px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        input { width: 100%; background: var(--bg); border: 1px solid var(--grid); color: white; padding: 12px; margin: 15px 0; border-radius: 10px; font-size: 1rem; }
        .modal-btns { display: flex; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="date-display" id="header-date">--</div>
        <div style="font-size: 0.7rem; opacity: 0.4;">SWIPE TO NAVIGATE</div>
    </header>

    <div class="dashboard">
        <div class="card active" data-idx="0" onclick="toggleDataset(0)"><h3>Zaj</h3><p id="live-noise">-- %</p></div>
        <div class="card" data-idx="2" onclick="toggleDataset(2)"><h3>Hő</h3><p id="live-temp">-- °C</p></div>
        <div class="card active" data-idx="1" onclick="toggleDataset(1)"><h3>Mozgás</h3><p id="live-move">Nincs</p></div>
        <div class="card" data-idx="3" onclick="toggleDataset(3)"><h3>Fény</h3><p id="live-lux">-- lx</p></div>
    </div>

    <div class="y-axis-guide">
        <div id="guide-left" style="opacity: 0.3"><span style="color:var(--temp)">Hő (15-35°C)</span> | <span style="color:var(--lux)">Fény (0-100lx)</span></div>
        <div id="guide-right"><span style="color:var(--primary)">Zaj (0-100%)</span></div>
    </div>

    <div class="minimap-wrapper" id="minimap-area">
        <canvas id="miniMapChart"></canvas>
        <div id="view-indicator"></div>
    </div>

    <div class="playhead-time" id="center-time">--:--</div>

    <div class="timeline-container">
        <button class="add-event-btn" onclick="openEventModal()">+</button>
        <div class="playhead"></div>
        <div class="chart-viewport" id="viewport">
            <div class="chart-wrapper" id="chart-holder">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <div id="event-modal">
        <h3 id="modal-title" style="margin:0">Esemény</h3>
        <p id="modal-time-label" style="opacity: 0.5; margin: 5px 0;"></p>
        <input type="text" id="event-input" placeholder="Megjegyzés...">
        <div class="modal-btns">
            <button class="btn" style="background:var(--primary); color:white; flex:2" onclick="saveEvent()">Mentés</button>
            <button id="del-btn" class="btn" style="background:var(--accent); color:white; flex:1; display:none" onclick="deleteEvent()">🗑️</button>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#64748b; width:100%; margin-top:15px;">Mégse</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const timeDisplay = document.getElementById('center-time');
        const indicator = document.getElementById('view-indicator');
        const minimapArea = document.getElementById('minimap-area');
        let events = [];
        let activeEventId = null;

        document.getElementById('header-date').innerText = new Date().toLocaleDateString('hu-HU', { year: 'numeric', month: 'long', day: 'numeric' });

        const generateData = () => {
            const data = []; const now = new Date();
            for (let i = 150; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 10 * 60000);
                data.push({
                    t: time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    noise: Math.random() * 20 + 10,
                    temp: 21 + Math.random() * 2,
                    move: Math.random() > 0.98 ? 40 : 0,
                    lux: Math.random() * 5
                });
            }
            return data;
        };
        const mockData = generateData();

        const commonScales = {
            x: { grid: { color: '#334155' }, ticks: { color: '#64748b' } },
            y: { position: 'right', display: false, min: 0, max: 100 },
            y1: { position: 'left', display: false, min: 0, max: 100 }
        };

        const mainChart = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [
                    { label: 'Zaj', data: mockData.map(d => d.noise), borderColor: '#38bdf8', fill: true, backgroundColor: 'rgba(56, 189, 248, 0.05)', tension: 0.4, pointRadius: 0 },
                    { label: 'Mozgás', data: mockData.map(d => d.move), backgroundColor: '#f43f5e', type: 'bar', barThickness: 4 },
                    { label: 'Hő', data: mockData.map(d => (d.temp - 15) * 5), borderColor: '#fbbf24', hidden: true, tension: 0.4, pointRadius: 0, yAxisID: 'y1' },
                    { label: 'Fény', data: mockData.map(d => d.lux), borderColor: '#a855f7', hidden: true, tension: 0.4, pointRadius: 0, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { ...commonScales, x: { display: true, grid: { color: '#334155' }, ticks: { color: '#64748b' } } }
            }
        });

        const miniMap = new Chart(document.getElementById('miniMapChart'), {
            type: 'line',
            data: {
                labels: mockData.map(d => d.t),
                datasets: [
                    { data: mockData.map(d => d.noise), borderColor: '#38bdf8', borderWidth: 1, fill: true, backgroundColor: 'rgba(56, 189, 248, 0.05)', pointRadius: 0, tension: 0.4 },
                    { data: mockData.map(d => d.move), backgroundColor: '#f43f5e', type: 'bar', barThickness: 1 },
                    { data: mockData.map(d => (d.temp - 15) * 5), borderColor: '#fbbf24', hidden: true, borderWidth: 1, pointRadius: 0 },
                    { data: mockData.map(d => d.lux), borderColor: '#a855f7', hidden: true, borderWidth: 1, pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } } }
        });

        viewport.addEventListener('scroll', () => {
            const scrollPercent = viewport.scrollLeft / (viewport.scrollWidth - viewport.clientWidth);
            const index = Math.round(scrollPercent * (mockData.length - 1));
            
            if(mockData[index]) {
                timeDisplay.innerText = mockData[index].t;
                window.currentIdx = index; // Pontos index a tű alatt
            }

            const indWidth = (viewport.clientWidth / viewport.scrollWidth) * 100;
            indicator.style.width = indWidth + "%";
            indicator.style.left = (scrollPercent * (100 - indWidth)) + "%";
        });

        minimapArea.addEventListener('click', (e) => {
            const rect = minimapArea.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            viewport.scrollTo({ left: (viewport.scrollWidth * pct) - (viewport.clientWidth / 2), behavior: 'smooth' });
        });

        function toggleDataset(idx) {
            const visible = mainChart.isDatasetVisible(idx);
            const cards = document.querySelectorAll('.card');
            if(visible) { 
                mainChart.hide(idx); miniMap.hide(idx); cards[idx].classList.remove('active');
            } else { 
                mainChart.show(idx); miniMap.show(idx); cards[idx].classList.add('active');
            }
            const showLeftAxis = mainChart.isDatasetVisible(2) || mainChart.isDatasetVisible(3);
            document.getElementById('guide-left').style.opacity = showLeftAxis ? "1" : "0.3";
            mainChart.update(); miniMap.update();
        }

        function openEventModal(id = null) {
            activeEventId = id;
            const modal = document.getElementById('event-modal');
            const input = document.getElementById('event-input');
            const delBtn = document.getElementById('del-btn');
            
            if(id !== null) {
                const ev = events.find(e => e.id === id);
                input.value = ev.text;
                delBtn.style.display = 'block';
                document.getElementById('modal-time-label').innerText = mockData[ev.idx].t;
            } else {
                input.value = '';
                delBtn.style.display = 'none';
                document.getElementById('modal-time-label').innerText = mockData[window.currentIdx].t;
            }
            modal.style.display = 'block';
        }

        function saveEvent() {
            const txt = document.getElementById('event-input').value;
            if(!txt) return;
            if(activeEventId) {
                events.find(e => e.id === activeEventId).text = txt;
            } else {
                // A tű alatti pontos index használata a mentéshez
                events.push({ id: Date.now(), idx: window.currentIdx, text: txt });
            }
            renderEvents(); closeModal();
        }

        function deleteEvent() {
            events = events.filter(e => e.id !== activeEventId);
            renderEvents(); closeModal();
        }

        function renderEvents() {
            document.querySelectorAll('.event-tag').forEach(t => t.remove());
            events.forEach(ev => {
                const x = mainChart.scales.x.getPixelForValue(mockData[ev.idx].t);
                const tag = document.createElement('div');
                tag.className = 'event-tag'; tag.innerText = ev.text; tag.style.left = x + "px";
                tag.onclick = (e) => { e.stopPropagation(); openEventModal(ev.id); };
                document.getElementById('chart-holder').appendChild(tag);
            });
        }

        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }

        setInterval(() => {
            document.getElementById('live-noise').innerText = Math.floor(Math.random() * 10 + 5) + " %";
            document.getElementById('live-temp').innerText = (21 + Math.random()).toFixed(1) + " °C";
            document.getElementById('live-lux').innerText = (Math.random() * 2).toFixed(1) + " lx";
        }, 3000);

        window.onload = () => { 
            viewport.scrollLeft = viewport.scrollWidth; 
            setTimeout(() => viewport.dispatchEvent(new Event('scroll')), 100);
        };
    </script>
</body>
</html>
